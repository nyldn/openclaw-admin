# OpenClaw Docker Compose — Production Configuration
# Usage: docker compose up -d

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    user: "1000:1000"

    # Bind to loopback only — never expose 18789 to public
    ports:
      - "127.0.0.1:18789:18789"

    volumes:
      # Persistent config and workspace
      - ${HOME}/.openclaw:/home/node/.openclaw
      - ${HOME}/.openclaw/workspace:/home/node/.openclaw/workspace

    environment:
      - NODE_ENV=production
      - OPENCLAW_HOME=/home/node

    # Extra mounts for AI provider CLIs (optional)
    # Uncomment and customize as needed:
    # - ${HOME}/.codex:/home/node/.codex:ro
    # - ${HOME}/.config/gemini:/home/node/.config/gemini:ro

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    # Security
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
